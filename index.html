<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LOCLY</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      color: #333;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #bookingsList div {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h1>LOCLY 🚀</h1>

  <!-- LOGIN SECTION -->
  <h2>Login with Phone</h2>

  <input type="text" id="phone" placeholder="+91XXXXXXXXXX">
  <button onclick="sendOTP()">Send OTP</button>

  <br><br>

  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify OTP</button>

  <div id="recaptcha-container"></div>

  <hr>

  <!-- BOOKING FORM -->
  <h2>Book a Guide</h2>

  <form id="bookingForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="location" placeholder="Location" required>
    <input type="date" id="date" required>
    <button type="submit">Book</button>
  </form>

  <p id="msg"></p>

  <hr>

  <!-- BOOKINGS LIST -->
  <h2>Bookings</h2>
  <div id="bookingsList"></div>

  <!-- FIREBASE + SCRIPT -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

    import {
      getAuth,
      RecaptchaVerifier,
      signInWithPhoneNumber
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBFvtn3zLyRhb5Cn98f6g67hyAnRim6-Ng",
      authDomain: "locly-8ec7a.firebaseapp.com",
      projectId: "locly-8ec7a",
      storageBucket: "locly-8ec7a.appspot.com",
      messagingSenderId: "758611732969",
      appId: "1:758611732969:web:ba311cc148e52577198378",
      measurementId: "G-5S4PT69N1Q"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // reCAPTCHA
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      'size': 'normal'
    });

    // SEND OTP
    window.sendOTP = function () {
      const phoneNumber = document.getElementById("phone").value;

      signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          alert("OTP Sent!");
        })
        .catch((error) => {
          alert(error.message);
        });
    };

    // VERIFY OTP
    window.verifyOTP = function () {
      const code = document.getElementById("otp").value;

      confirmationResult.confirm(code)
        .then((result) => {
          alert("Login Successful!");
        })
        .catch(() => {
          alert("Invalid OTP");
        });
    };

    // BOOKING SUBMIT
    document.getElementById("bookingForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        location: document.getElementById("location").value,
        date: document.getElementById("date").value
      };

      fetch("https://locly-backend.onrender.com/book", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("msg").innerText = data.message;
        loadBookings();
      });
    });

    // LOAD BOOKINGS
    function loadBookings() {
      fetch("https://locly-backend.onrender.com/bookings")
        .then(res => res.json())
        .then(data => {
          let output = "";

          data.forEach(item => {
            output += `
              <div>
                <b>${item.name}</b> - ${item.location} <br>
                Date: ${item.date}
              </div>
            `;
          });

          document.getElementById("bookingsList").innerHTML = output;
        });
    }

    // AUTO LOAD
    loadBookings();

  </script>

</body>
</html>
